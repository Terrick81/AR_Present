<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Бесплатный AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden; background-color: black;">
  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" 
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
  >
    <!-- Невидимая плоскость для "пола", чтобы объект стоял -->
    <a-plane position="0 0 -3" rotation="-90 0 0" width="4" height="4" visible="false" shadow="receive"></a-plane>
    
    <!-- САМ ОБЪЕКТ. Меняйте position (x, y, z). y = -0.5 ставит на пол -->
    <a-box position="0 -0.5 -2" material="color: #ff5500; roughness: 0.4; metalness: 0.1;" shadow></a-box>
    
    <!-- Полупрозрачная сетка для понимания плоскости -->
    <a-grid position="0 0 -2" rotation="-90 0 0" grid="side: double" material="color: #88ccff; opacity: 0.15;"></a-grid>
    
    <!-- Подсказка для пользователя -->
    <a-text value="🔄 Медленно поводите телефон в стороны" position="0 1.5 -3" color="white" align="center" scale="0.8 0.8 0.8"></a-text>
  </a-scene>
</body>
</html>
