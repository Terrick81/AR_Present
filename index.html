<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Галерея — 30 лет на службе</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.9);
      color: white; z-index: 10;
    }
    #overlay h1 { font-size: 1.8rem; margin-bottom: 8px; text-align: center; }
    #overlay p  { font-size: 0.95rem; color: #aaa; margin-bottom: 24px; text-align: center; max-width: 320px; line-height: 1.5; }

    #startBtn {
      padding: 14px 40px; font-size: 1.1rem;
      background: linear-gradient(135deg, #c8a84b, #f5d078);
      color: #1a1a1a; border: none; border-radius: 50px;
      cursor: pointer; font-weight: bold;
      box-shadow: 0 4px 20px rgba(200,168,75,0.4);
    }
    #startBtn:disabled { background: #555; color: #999; box-shadow: none; cursor: default; }

    #hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: white;
      padding: 10px 22px; border-radius: 20px;
      font-size: 0.9rem; z-index: 5; display: none; text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #exitBtn {
      position: fixed; top: 20px; right: 20px;
      background: rgba(0,0,0,0.5); color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 18px; border-radius: 20px;
      cursor: pointer; font-size: 0.9rem; z-index: 5; display: none;
    }
    #errorMsg { color: #f77; margin-top: 14px; font-size: 0.9rem; display: none; text-align: center; max-width: 300px; }
  </style>
</head>
<body>

<div id="overlay">
  <h1>🏛️ AR Галерея<br/>30 лет на службе</h1>
  <p id="desc">Наведите камеру на пол. Нажмите, чтобы разместить галерею.</p>
  <button id="startBtn">✨ Запустить AR</button>
  <p id="errorMsg"></p>
</div>

<div id="hint"></div>
<button id="exitBtn">✕ Выйти</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@latest/build/webxr-polyfill.js"></script>
<script>
new WebXRPolyfill();

// ============ Браузер-детектор и выбор режима =============
function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.userAgent.includes('Macintosh') && 'ontouchend' in document);
}
function isSafari() {
  return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
}
function detectARMode() {
  if (navigator.xr && navigator.xr.isSessionSupported) return 'webxr'; // Chrome, Яндекс-Браузер
  if (isIOS() && isSafari()) return 'quicklook'; // Только QuickLook (usdz) на iOS
  return 'fallback';
}

// =========== AR Quick Look .usdz (нужно подготовить свой файл) ===========
const QUICKLOOK_URL = 'ar/gallery.usdz';  

// ============== Three.js и галерея как в вашем коде =====================
const PHOTOS = [
  { url: 'photos/photo1.jpg',  label: '1994 год  •  Начало пути' },
  { url: 'photos/photo2.jpg',  label: '1997 год  •  Первые успехи' },
  { url: 'photos/photo3.jpg',  label: '2000 год  •  Новый век' },
  { url: 'photos/photo4.jpg',  label: '2005 год  •  ЛПП' },
  { url: 'photos/photo5.jpg',  label: '2008 год  •  ЛПП' },
  { url: 'photos/photo6.jpg',  label: '2011 год  •  ЛПП' },
  { url: 'photos/photo7.jpg',  label: '2014 год  •  ЛПП' },
  { url: 'photos/photo8.jpg',  label: '2018 год  •  ЛПП' },
  { url: 'photos/photo9.jpg',  label: '2021 год  •  ЛПП' },
  { url: 'photos/photo10.jpg', label: '2024 год  •  30 лет!' },
];

const SPACING   = 0.95;
const SIDE_DIST = 0.85;
const PHOTO_W   = 0.52;
const FRAME_T   = 0.022;
const STAND_H   = 1.4;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.outputEncoding    = THREE.sRGBEncoding;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 30);

// == Свет и всё для галереи — полностью ваш сценарий ===
const ambient = new THREE.AmbientLight(0xffffff, 2.5);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0xffffff, 0x888888, 1.5);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 2.0);
sun.position.set(2, 5, 2);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far  = 15;
sun.shadow.camera.left = sun.shadow.camera.bottom = -5;
sun.shadow.camera.right = sun.shadow.camera.top   =  5;
scene.add(sun);

const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20).rotateX(-Math.PI/2),
  new THREE.ShadowMaterial({ opacity: 0.25 })
);
floorMesh.receiveShadow = true;
floorMesh.visible = false;
scene.add(floorMesh);

const txLoader = new THREE.TextureLoader();
function loadTextureWithRatio(url) {
  return new Promise(resolve => {
    txLoader.load(
      url,
      tex => {
        tex.encoding = THREE.sRGBEncoding;
        const img    = tex.image;
        const ratio  = img ? img.width / img.height : 1.0;
        resolve({ tex, ratio });
      },
      undefined,
      () => {
        // placeholder если нет файла
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, 512, 512);
        ctx.strokeStyle = '#c8a84b';
        ctx.lineWidth = 8;
        ctx.strokeRect(16, 16, 480, 480);
        ctx.fillStyle = '#c8a84b';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ФОТО', 256, 240);
        ctx.font = '32px Arial';
        ctx.fillText(url.split('/').pop(), 256, 300);
        const t = new THREE.CanvasTexture(canvas);
        t.encoding = THREE.sRGBEncoding;
        resolve({ tex: t, ratio: 1.0 });
      }
    );
  });
}
function makeTextTexture(text, opts = {}) {
  const {
    font  = 'bold 36px Arial',
    color = '#f5d078',
    w = 512, h = 72
  } = opts;
  const c   = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  ctx.font         = font;
  ctx.fillStyle    = color;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor  = 'rgba(0,0,0,0.9)';
  ctx.shadowBlur   = 6;
  ctx.fillText(text, w/2, h/2);
  const t = new THREE.CanvasTexture(c);
  t.encoding = THREE.sRGBEncoding;
  return { texture: t, aspect: w/h };
}
function makeFrame(w, h, t) {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color:     new THREE.Color(0xc8a84b),
    emissive:  new THREE.Color(0x3a2800),
    emissiveIntensity: 0.15,
    roughness: 0.25,
    metalness: 0.95,
  });

  [
    { sx: w+t*2, sy: t,   px: 0,      py:  h/2+t/2 },
    { sx: w+t*2, sy: t,   px: 0,      py: -h/2-t/2 },
    { sx: t,     sy: h,   px:-w/2-t/2,py: 0 },
    { sx: t,     sy: h,   px: w/2+t/2,py: 0 },
  ].forEach(p => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(p.sx, p.sy, t*0.8), mat);
    m.position.set(p.px, p.py, 0.001);
    m.castShadow    = true;
    m.receiveShadow = true;
    group.add(m);
  });
  return group;
}
async function makePhotoStand(photoIdx, side) {
  const { tex, ratio } = await loadTextureWithRatio(PHOTOS[photoIdx].url);
  const pw = PHOTO_W;
  const ph = pw / ratio; 
  const group = new THREE.Group();

  const backMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1, metalness: 0 });
  const back    = new THREE.Mesh(new THREE.BoxGeometry(pw + FRAME_T*2.5, ph + FRAME_T*2.5, 0.008), backMat);
  back.position.z = -0.005;
  back.receiveShadow = true;
  group.add(back);

  const photo = new THREE.Mesh(
    new THREE.PlaneGeometry(pw, ph),
    new THREE.MeshStandardMaterial({
      map: tex,
      roughness: 0.6,
      metalness: 0.0,
      emissive: new THREE.Color(0x111111),
      emissiveIntensity: 0.05,
    })
  );
  photo.castShadow = photo.receiveShadow = true;
  group.add(photo);

  group.add(makeFrame(pw, ph, FRAME_T));
  const { texture: lblTex, aspect: lblAsp } = makeTextTexture(PHOTOS[photoIdx].label, {
    font: 'bold 34px Arial', color: '#f5d078', w: 512, h: 68
  });
  const lblH = 0.065;
  const lbl  = new THREE.Mesh(
    new THREE.PlaneGeometry(lblH * lblAsp, lblH),
    new THREE.MeshBasicMaterial({ map: lblTex, transparent: true, depthWrite: false })
  );
  lbl.position.set(0, -ph/2 - 0.065, 0.01);
  group.add(lbl);

  const spot = new THREE.SpotLight(0xfff8e7, 4.0, 3.0, Math.PI/8, 0.5, 1.2);
  spot.castShadow = true;
  spot.shadow.mapSize.set(512, 512);
  spot.shadow.bias = -0.001;
  spot.position.set(0, ph * 0.8, 0.5);

  const spotTarget = new THREE.Object3D();
  spotTarget.position.set(0, 0, 0);
  group.add(spotTarget);
  spot.target = spotTarget;
  group.add(spot);

  group.rotation.y = side > 0 ? -Math.PI/2 : Math.PI/2;
  return group;
}
const GOLD_MAT = new THREE.MeshStandardMaterial({
  color:            new THREE.Color(0xFFD700),
  emissive:         new THREE.Color(0x7A5500),
  emissiveIntensity: 0.2,
  roughness:        0.15,
  metalness:        1.0,
  envMapIntensity:  1.0,
});
function buildEnvMap() {
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0x222222);
  [
    [0xfff5cc, 3,  5,  5],
    [0xffd080, 2, -5,  3],
    [0x88aaff, 1,  0, -5],
  ].forEach(([c, i, x, y]) => {
    const l = new THREE.PointLight(c, i, 20);
    l.position.set(x, y, 3);
    envScene.add(l);
  });

  const rt  = pmrem.fromScene(new THREE.RoomEnvironment(), 0.04);
  pmrem.dispose();
  return rt.texture;
}
function makeGold3DText(text, size, depth, yOffset) {
  const group = new THREE.Group();
  const scale = 200;
  const cv    = document.createElement('canvas');
  cv.width    = Math.ceil(text.length * size * scale * 0.65);
  cv.height   = Math.ceil(size * scale * 1.3);
  const ctx   = cv.getContext('2d');
  const pxSize = size * scale;
  ctx.font     = `900 ${pxSize}px Arial Black, Arial`;
  ctx.fillStyle = '#ffffff';
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'center';
  ctx.fillText(text, cv.width/2, cv.height/2);

  const layers = 6;
  for (let i = 0; i < layers; i++) {
    const zOff  = (i / layers) * depth - depth/2;
    const alpha = i === 0 || i === layers-1 ? 1.0 : 0.85;
    const shade = 1.0 - i * 0.06;
    const layerCV  = document.createElement('canvas');
    layerCV.width  = cv.width;
    layerCV.height = cv.height;
    const lCtx     = layerCV.getContext('2d');
    const grd = lCtx.createLinearGradient(0, 0, cv.width, cv.height);
    grd.addColorStop(0.0,  `rgba(255,245,150,${alpha})`);
    grd.addColorStop(0.2,  `rgba(255,215,  0,${alpha})`);
    grd.addColorStop(0.4,  `rgba(200,160, 30,${alpha})`);
    grd.addColorStop(0.6,  `rgba(255,220, 50,${alpha})`);
    grd.addColorStop(0.8,  `rgba(180,130, 10,${alpha})`);
    grd.addColorStop(1.0,  `rgba(255,200, 20,${alpha})`);
    lCtx.font         = `900 ${pxSize}px Arial Black, Arial`;
    lCtx.textBaseline = 'middle';
    lCtx.textAlign    = 'center';
    lCtx.fillStyle    = grd;
    lCtx.fillText(text, cv.width/2, cv.height/2);

    // Shine
    if (i === layers - 1) {
      const shine = lCtx.createLinearGradient(0, 0, cv.width*0.6, cv.height*0.6);
      shine.addColorStop(0,   'rgba(255,255,255,0.55)');
      shine.addColorStop(0.5, 'rgba(255,255,255,0.0)');
      lCtx.globalCompositeOperation = 'source-atop';
      lCtx.fillStyle = shine;
      lCtx.fillText(text, cv.width/2, cv.height/2);
      lCtx.globalCompositeOperation = 'source-over';
    }

    const tex   = new THREE.CanvasTexture(layerCV);
    tex.encoding = THREE.sRGBEncoding;

    const w = cv.width  / scale;
    const h = cv.height / scale;

    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(w, h),
      new THREE.MeshStandardMaterial({
        map:          tex,
        transparent:  true,
        alphaTest:    0.05,
        roughness:    0.15 + i * 0.04,
        metalness:    0.95,
        emissive:     new THREE.Color(0x7A5500),
        emissiveMap:  tex,
        emissiveIntensity: 0.25,
        side: THREE.DoubleSide,
        depthWrite: i === layers - 1,
      })
    );
    mesh.position.z  = zOff;
    mesh.castShadow  = true;
    group.add(mesh);
  }
  group.position.y = yOffset;
  return group;
}
function makePedestal() {
  const group = new THREE.Group();
  const mat   = new THREE.MeshStandardMaterial({
    color: 0x2a2a2a, roughness: 0.45, metalness: 0.5
  });
  const topMat = new THREE.MeshStandardMaterial({
    color:     new THREE.Color(0xc8a84b),
    emissive:  new THREE.Color(0x3a2800),
    emissiveIntensity: 0.1,
    roughness: 0.2, metalness: 0.95
  });

  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.34, 0.07, 6), mat);
  base.castShadow = base.receiveShadow = true;
  group.add(base);

  const col = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.18, 0.45, 6), mat);
  col.position.y = 0.26;
  col.castShadow = col.receiveShadow = true;
  group.add(col);

  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.13, 0.05, 6), topMat);
  top.position.y = 0.51;
  top.castShadow = top.receiveShadow = true;
  group.add(top);

  return group;
}
const galleryRoot = new THREE.Group();
galleryRoot.visible = false;
scene.add(galleryRoot);
galleryRoot.add(floorMesh);
// Асинхронная расстановка фото
async function buildGallery() {
  const promises = [];

  for (let i = 0; i < 10; i++) {
    const side = i % 2 === 0 ? -1 : 1;
    const idx  = Math.floor(i / 2);

    promises.push(
      makePhotoStand(i, side).then(stand => {
        stand.position.set(
          side * SIDE_DIST,
          STAND_H,
          -(idx * SPACING)
        );
        galleryRoot.add(stand);
      })
    );
  }

  await Promise.all(promises);

  // Пьедестал
  const endZ    = -(4 * SPACING + 1.3);
  const pedestal = makePedestal();
  pedestal.position.set(0, 0, endZ);
  galleryRoot.add(pedestal);

  // 3D надпись «30 ЛЕТ» — крупно
  const text30  = makeGold3DText('30 ЛЕТ', 0.22, 0.06, 0);
  // 3D надпись «НА СЛУЖБЕ» — поменьше
  const textSvc = makeGold3DText('НА СЛУЖБЕ', 0.10, 0.035, -0.17);

  // Группа надписи — ниже, ближе к пьедесталу
  const signGroup = new THREE.Group();
  signGroup.add(text30);
  signGroup.add(textSvc);
  signGroup.position.set(0, 0.72, endZ); // ↓ ниже (было 1.35)
  galleryRoot.add(signGroup);

  // Прожектор на пьедестал
  const pedesSpot = new THREE.SpotLight(0xffd080, 5.0, 4, Math.PI/7, 0.3, 1.2);
  pedesSpot.castShadow = true;
  pedesSpot.shadow.mapSize.set(512, 512);
  pedesSpot.position.set(0, 2.5, endZ + 0.7);
  const pt = new THREE.Object3D();
  pt.position.set(0, 0.7, endZ);
  scene.add(pt);
  pedesSpot.target = pt;
  galleryRoot.add(pedesSpot);

  // Точечный свет — золотое сияние вокруг надписи
  const glow = new THREE.PointLight(0xffd060, 2.5, 1.5);
  glow.position.set(0, 0.85, endZ);
  galleryRoot.add(glow);

  // Env map для золота
  try {
    const envMap = buildEnvMap();
    scene.environment = envMap;
  } catch(e) {}

  return signGroup;
}
let signGroup = null;
buildGallery().then(sg => { signGroup = sg; });

const reticle = new THREE.Mesh(
  new THREE.RingGeometry(0.08, 0.12, 32).rotateX(-Math.PI/2),
  new THREE.MeshBasicMaterial({ color: 0xf5d078, side: THREE.DoubleSide })
);
reticle.visible = false;
scene.add(reticle);

// ========== DOM / XR / Fallback-логика =============
const overlay  = document.getElementById('overlay');
const desc     = document.getElementById('desc');
const startBtn = document.getElementById('startBtn');
const errorMsg = document.getElementById('errorMsg');
const hint     = document.getElementById('hint');
const exitBtn  = document.getElementById('exitBtn');

let xrSession  = null;
let hitTestSrc = null;
let placed     = false;
const clock    = new THREE.Clock();

function showError(m) {
  errorMsg.textContent  = m;
  errorMsg.style.display = 'block';
}

// Платформозависимая кнопка запуска
function initARButton() {
  const mode = detectARMode();

  if (mode === 'webxr') {
    startBtn.textContent = '✨ Запустить AR';
    desc.textContent = 'Наведите камеру на пол. Нажмите, чтобы разместить галерею.';
    startBtn.disabled = false;
    startBtn.onclick     = startAR;
  } else if (mode === 'quicklook') {
    startBtn.textContent = '👁‍🗨 Открыть в AR (iOS)';
    desc.textContent = 'AR-режим работает через Quick Look на iOS.';
    // <a rel="ar"> for QuickLook
    startBtn.onclick = () => {
      // Создаём скрытую ссылку для Quick Look
      const a = document.createElement('a');
      a.rel   = 'ar';
      a.href  = QUICKLOOK_URL;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 1200);
    };
    startBtn.disabled = false;
    errorMsg.style.display = 'none';
  } else {
    startBtn.textContent = '👁 Посмотреть 3D-галерею';
    desc.textContent = 'Ваш браузер не поддерживает AR — доступен только обычный 3D-просмотр галереи.';
    startBtn.onclick = startFallback3D;
    startBtn.disabled = false;
    errorMsg.style.display = 'none';
  }
}

// Fallback — обычная 3D-сцена без AR
function startFallback3D() {
  overlay.style.display = 'none';
  exitBtn.style.display = 'block';
  galleryRoot.visible  = true;
  floorMesh.visible    = true;
  renderer.setAnimationLoop(onFrame);
}

// ======= Исходный WebXR AR логика ==========
async function startAR() {
  startBtn.disabled = true;
  if (!navigator.xr) {
    showError('WebXR не поддерживается. Нужен Chrome или Яндекс.Браузер на Android.');
    startBtn.disabled = false; return;
  }
  const ok = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if (!ok) {
    showError('AR не поддерживается на этом устройстве.');
    startBtn.disabled = false; return;
  }

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.body }
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);

    overlay.style.display = 'none';
    hint.style.display    = 'block';
    hint.textContent      = '📍 Наведите на пол и нажмите — разместить галерею';
    exitBtn.style.display = 'block';

    const viewerSpace = await xrSession.requestReferenceSpace('viewer');
    hitTestSrc = await xrSession.requestHitTestSource({ space: viewerSpace });

    renderer.domElement.addEventListener('click', onTap);
    xrSession.addEventListener('end', onEnd);
    renderer.setAnimationLoop(onFrame);

  } catch(e) {
    showError('Ошибка: ' + e.message);
    startBtn.disabled = false;
  }
}
function onTap() {
  if (!reticle.visible || placed) return;
  placed = true;
  galleryRoot.position.copy(reticle.position);
  floorMesh.position.copy(reticle.position);
  floorMesh.visible    = true;
  galleryRoot.visible  = true;
  reticle.visible      = false;
  hint.textContent = '🚶 Пройдитесь вдоль галереи!';
  setTimeout(() => { hint.style.display = 'none'; }, 5000);
}
function onFrame(time, frame) {
  if (!frame) return;
  const refSpace = renderer.xr.getReferenceSpace();

  if (hitTestSrc && !placed) {
    const hits = frame.getHitTestResults(hitTestSrc);
    if (hits.length) {
      const pose = hits[0].getPose(refSpace);
      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      reticle.matrix.decompose(reticle.position, reticle.quaternion, reticle.scale);
    } else {
      reticle.visible = false;
    }
  }

  if (placed && signGroup) {
    const t = clock.getElapsedTime();
    signGroup.position.y = 0.72 + Math.sin(t * 1.1) * 0.04;
    signGroup.rotation.y = Math.sin(t * 0.35) * 0.12;
    galleryRoot.children.forEach(c => {
      if (c.isPointLight) {
        c.intensity = 2.2 + Math.sin(t * 2.2) * 0.8;
      }
    });
  }
  renderer.render(scene, camera);
}
function onEnd() {
  renderer.setAnimationLoop(null);
  if (hitTestSrc) { hitTestSrc.cancel(); hitTestSrc = null; }
  placed = false;
  galleryRoot.visible = false;
  reticle.visible     = false;
  floorMesh.visible   = false;
  renderer.domElement.removeEventListener('click', onTap);
  overlay.style.display   = '';
  hint.style.display      = 'none';
  exitBtn.style.display   = 'none';
  startBtn.disabled       = false;
  clock.getDelta();
}
exitBtn.addEventListener('click', () => {
  if (xrSession && xrSession.end) xrSession.end();
  overlay.style.display = '';
  galleryRoot.visible = false;
  floorMesh.visible = false;
  renderer.setAnimationLoop(null);
  startBtn.disabled = false;
});

// ==== Адаптация под resize ====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ======= ИНИЦИАЛИЗАЦИЯ =======
window.addEventListener('DOMContentLoaded', initARButton);

</script>
</body>
